<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PropVault</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0B0F14;
  color: #E6EDF3;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: #0D1117;
  border-bottom: 1px solid #1F2937;
}

.logo {
  color: #FACC15;
  font-weight: bold;
  font-size: 20px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

.hero p {
  color: #9CA3AF;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  padding: 40px;
}

/* CARD */
.card {
  background: #111827;
  border: 1px solid #1F2937;
  border-radius: 12px;
  padding: 20px;
  transition: 0.3s;
}

.card:hover {
  border-color: #FACC15;
  transform: translateY(-5px);
}

/* BADGE */
.badge {
  display: inline-block;
  background: #052e16;
  color: #22c55e;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
  margin-bottom: 10px;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 10px;
  background: #FACC15;
  color: black;
  border: none;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #eab308;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div class="logo">PropVault</div>
  <div>Home | Firms | Deals</div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Find the Best Prop Firm</h1>
  <p>Compare pricing, drawdown & payouts</p>
</section>

<!-- FIRMS -->
<div class="grid" id="firms"></div>

<script>


const container = document.getElementById("firms");

firms.forEach(firm => {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <h3>${firm.name}</h3>
    <p>Profit Split: ${firm.profit_split}%</p>
    <p>Price: $${firm.price}</p>
    <button onclick="window.open('${firm.link}')">Start Challenge</button>
  `;
  container.appendChild(div);
});
</script>
<div id="firms" class="grid"></div>
</body>
</html>
