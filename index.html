<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninja Props</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f0f0f0;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
        }
        .navbar a {
            text-decoration: none;
            padding: 10px 15px;
            color: #333;
        }
        .hero {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 400px;
            background: url('hero-image.jpg') no-repeat center center;
            background-size: cover;
        }
        .hero h1 {
            color: white;
            font-size: 3rem;
        }
        .filters {
            margin: 20px;
            display: flex;
            justify-content: space-around;
        }
        .filter {
            padding: 10px;
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">Ninja Props</div>
        <div class="auth-buttons">
            <a href="#login">Login</a>
            <a href="#register">Register</a>
        </div>
    </div>
    <div class="hero">
        <h1>Find Your Perfect Prop</h1>
    </div>
    <div class="filters">
        <div class="filter">Filter 1</div>
        <div class="filter">Filter 2</div>
        <div class="filter">Filter 3</div>
    </div>
    <div class="card-grid">
        <div class="card">Prop Firm Card 1</div>
        <div class="card">Prop Firm Card 2</div>
        <div class="card">Prop Firm Card 3</div>
        <div class="card">Prop Firm Card 4</div>
    </div>
</body>
</html>
